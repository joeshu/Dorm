name: Build MengguiDorm IPA

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
        
    - name: Show Xcode version
      run: xcodebuild -version
      
    - name: Build Archive
      run: |
        # 创建构建目录
        mkdir -p build
        
        # 构建归档文件
        xcodebuild archive \
          -project MengguiDorm.xcodeproj \
          -scheme MengguiDorm \
          -destination "generic/platform=iOS" \
          -archivePath "build/MengguiDorm.xcarchive" \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO
          
    - name: Export IPA (Unsigned)
      run: |
        # 创建 Payload 目录
        mkdir -p build/Payload
        
        # 复制 .app 文件到 Payload
        cp -R "build/MengguiDorm.xcarchive/Products/Applications/MengguiDorm.app" build/Payload/
        
        # 创建 IPA 文件
        cd build
        zip -r "MengguiDorm-unsigned.ipa" Payload
        cd ..
        
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MengguiDorm-IPA
        path: build/MengguiDorm-unsigned.ipa
        retention-days: 30
        
    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: build/MengguiDorm-unsigned.ipa
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        body: |
          ## 猛鬼宿舍 iOS 版 (MengguiDorm)
          
          ### 版本信息
          - 构建号: ${{ github.run_number }}
          - 提交: ${{ github.sha }}
          
          ### 游戏特色
          - 🎮 塔防生存玩法
          - 👻 智能猛鬼 AI
          - 🏰 升级房门和床铺
          - 🔫 建造炮台自动攻击
          - ❄️ 放置陷阱控制猛鬼
          - 💰 睡觉赚取金币系统
          
          ### 安装说明
          1. 下载 `MengguiDorm-unsigned.ipa`
          2. 使用 AltStore、Sideloadly 或 Xcode 安装到 iOS 设备
          3. 需要在设置中信任开发者证书
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
