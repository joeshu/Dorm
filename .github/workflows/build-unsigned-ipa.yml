name: Build unsigned IPA

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: |
          brew install xcodegen

      - name: Generate project
        run: |
          xcodegen generate
          ls -la
          find MengguiDorm.xcodeproj -maxdepth 3 -print

      - name: Show project schemes
        run: |
          xcodebuild -list -project MengguiDorm.xcodeproj

      - name: Build archive
        run: |
          mkdir -p build
          xcodebuild \
            -project MengguiDorm.xcodeproj \
            -scheme MengguiDorm \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/MengguiDorm.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY='' \
            clean archive

      - name: Export unsigned IPA
        run: |
          mkdir -p build/Payload
          cp -R build/MengguiDorm.xcarchive/Products/Applications/MengguiDorm.app build/Payload/
          cd build
          /usr/bin/zip -r MengguiDorm.ipa Payload
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MengguiDorm-IPA
          path: build/MengguiDorm.ipa
          retention-days: 30

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ipa-${{ github.run_number }}
          name: MengguiDorm IPA #${{ github.run_number }}
          draft: false
          prerelease: false
          files: build/MengguiDorm.ipa
          body: |
            Automated unsigned IPA build for MengguiDorm.

            - Commit: ${{ github.sha }}
            - Workflow run: ${{ github.run_number }}
            - Artifact: MengguiDorm.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
